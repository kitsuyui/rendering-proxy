name: octocov
on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  octocov:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --user root
    services:
      httpbin:
        image: kennethreitz/httpbin
    env:
      RUNNING_IN_DOCKER: "1"
    strategy:
      fail-fast: false
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v6

      - name: Install Bun prerequisites
        run: |
          apt-get update
          apt-get install -y unzip

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Test packaging
        run: bun pm pack

      # See also: https://github.com/k1LoW/octocov-action
      - name: Report coverage with octocov
        uses: k1LoW/octocov-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          config: .octocov.yml
