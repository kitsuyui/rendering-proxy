name: Release

on:
  pull_request:
    types: [opened, synchronize, reopened]
  release:
    # "released" events are emitted either when directly be released or be edited from pre-released.
    types: [prereleased, released]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: install and build
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Validate release version
        if: github.event_name == 'release'
        run: |
          set -eu
          package_version=$(node -p "require('./package.json').version")
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$package_version" != "$tag_version" ]; then
            echo "release tag v${tag_version} does not match package.json version ${package_version}" >&2
            exit 1
          fi

      - run: npm pack

      - name: Test installation
        run: |
          set -eu
          built_dir=$(pwd)
          tarball=$(find "$built_dir" -maxdepth 1 -name '*.tgz' -print -quit)
          if [ -z "$tarball" ]; then
            echo "expected packed tarball was not found" >&2
            exit 1
          fi
          tempdir=$(mktemp -d)
          cd "$tempdir"
          printf '{"name":"tmp","private":true}\n' > package.json
          bun add "file:$tarball"
          bunx --bun rendering-proxy --help
          cd "$built_dir"
          rm -rf "$tempdir"

      - run: npm publish
        if: github.event_name == 'release' && !github.event.release.prerelease
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
