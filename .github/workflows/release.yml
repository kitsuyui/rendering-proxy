name: Release

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    tags:
      - 'v*.*.*'
  release:
    # "released" events are emitted either when directly be released or be edited from pre-released.
    types: [prereleased, released]

permissions:
  contents: read

jobs:
  verify:
    name: Verify package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: install and build
        run: |
          bun install --frozen-lockfile
          bun run build

      - run: npm pack

      - name: Test installation
        run: |
          set -eu
          built_dir=$(pwd)
          tarball=$(find "$built_dir" -maxdepth 1 -name '*.tgz' -print -quit)
          if [ -z "$tarball" ]; then
            echo "expected packed tarball was not found" >&2
            exit 1
          fi
          tempdir=$(mktemp -d)
          trap 'rm -rf "$tempdir"' EXIT
          cd "$tempdir"
          printf '{"name":"tmp","private":true}\n' > package.json
          bun add "file:$tarball"
          bunx --bun rendering-proxy --help
          cd "$built_dir"
          rm -rf "$tempdir"
          trap - EXIT

  publish:
    name: Publish package
    needs: verify
    if: github.event_name == 'push' || (github.event_name == 'release' && !github.event.release.prerelease)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: install and build
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Validate stable release tag
        if: github.event_name == 'push'
        run: |
          set -eu
          if ! printf '%s' "$GITHUB_REF_NAME" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "tag pushes only publish stable vMAJOR.MINOR.PATCH tags" >&2
            exit 1
          fi

      - name: update version
        run: |
          git config user.email "dummy@dummy"
          git config user.name "dummy"
          npm version from-git --allow-same-version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: npm pack

      - name: Test installation
        run: |
          set -eu
          built_dir=$(pwd)
          tarball=$(find "$built_dir" -maxdepth 1 -name '*.tgz' -print -quit)
          if [ -z "$tarball" ]; then
            echo "expected packed tarball was not found" >&2
            exit 1
          fi
          tempdir=$(mktemp -d)
          trap 'rm -rf "$tempdir"' EXIT
          cd "$tempdir"
          printf '{"name":"tmp","private":true}\n' > package.json
          bun add "file:$tarball"
          bunx --bun rendering-proxy --help
          cd "$built_dir"
          rm -rf "$tempdir"
          trap - EXIT

      - name: Check published package version
        id: npm_version
        run: |
          set -eu
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if npm view "rendering-proxy@$version" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: npm publish --provenance
        if: steps.npm_version.outputs.published == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release for tag pushes
        if: github.event_name == 'push'
        run: |
          set -eu
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "GitHub Release $tag already exists"
          else
            gh release create "$tag" --verify-tag --generate-notes
          fi
        env:
          GH_TOKEN: ${{ github.token }}
