name: gh-counter
on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: gh-counter-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  gh-counter:
    uses: kitsuyui/gh-actions-workflows/.github/workflows/gh-counter.yml@a7071a4635eaece62696cd7132306616ce283c47
